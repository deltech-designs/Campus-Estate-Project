<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login — Campus Estate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'DM Sans', sans-serif; }
        h1 { font-family: 'Playfair Display', serif; }
        .toast { transition: all 0.35s ease; }
        .input-error { border-color: #dc2626 !important; }
        .field-error { color:#dc2626; font-size:0.75rem; margin-top:0.3rem; }
        .eye-btn { cursor: pointer; user-select: none; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- Navbar -->
<nav class="bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between shadow-sm">
    <a href="index.html" class="flex items-center gap-2">
        <div class="w-9 h-9 rounded-xl bg-blue-900 flex items-center justify-center text-white">🏠</div>
        <div>
            <div class="font-bold text-blue-900 text-base leading-none">CampusEstate</div>
            <div class="text-xs text-gray-400">Management System</div>
        </div>
    </a>
    <div class="flex items-center gap-3">
        <a href="register.html"    class="text-sm text-blue-900 border border-blue-900 px-4 py-2 rounded-lg hover:bg-blue-50 transition-colors">Register</a>
        <a href="admin-login.html" class="text-sm text-gray-400 hover:text-gray-600 transition-colors">Admin ↗</a>
    </div>
</nav>

<!-- Page Body -->
<div class="min-h-screen flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md">

        <!-- Back link -->
        <a href="index.html" class="inline-flex items-center gap-1 text-sm text-gray-500 hover:text-gray-700 mb-8 transition-colors">← Back to Home</a>

        <!-- Card -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8">

            <!-- Logo -->
            <div class="flex items-center gap-3 mb-8">
                <div class="w-10 h-10 rounded-xl bg-blue-900 flex items-center justify-center text-lg">🏠</div>
                <div>
                    <div class="font-bold text-blue-900">CampusEstate</div>
                    <div class="text-xs text-gray-400">Student Portal</div>
                </div>
            </div>

            <h1 class="text-2xl font-bold text-gray-900 mb-1">Welcome Back</h1>
            <p class="text-gray-500 text-sm mb-8">Sign in to access your hostel dashboard.</p>

            <!-- Demo hint -->
            <div class="bg-amber-50 border border-amber-200 rounded-xl p-3 mb-6 text-xs text-amber-700">
                <strong>Demo Login:</strong> student@campus.edu &nbsp;/&nbsp; password123
            </div>

            <!-- Error box -->
            <div id="error-box" class="hidden bg-red-50 border border-red-200 text-red-700 text-sm px-4 py-3 rounded-xl mb-5"></div>

            <!-- Login Form -->
            <form id="login-form" novalidate class="space-y-5">

                <!-- Email -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">Email Address</label>
                    <input id="email" type="email" placeholder="student@campus.edu"
                        class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all">
                    <div id="err-email" class="field-error hidden"></div>
                </div>

                <!-- Password with show/hide toggle -->
                <div>
                    <div class="flex justify-between items-center mb-1.5">
                        <label class="text-sm font-medium text-gray-700">Password</label>
                        <button type="button" onclick="forgotPassword()" class="text-xs text-blue-600 hover:underline">Forgot password?</button>
                    </div>
                    <div class="relative">
                        <input id="password" type="password" placeholder="Enter your password"
                            class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all pr-12">
                        <!-- Show/hide password button -->
                        <button type="button" id="toggle-pw" onclick="togglePassword()" class="eye-btn absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 text-lg">
                            👁
                        </button>
                    </div>
                    <div id="err-password" class="field-error hidden"></div>
                </div>

                <!-- Remember me -->
                <div class="flex items-center gap-2">
                    <input type="checkbox" id="remember" class="w-4 h-4 accent-blue-900 rounded">
                    <label for="remember" class="text-sm text-gray-600 cursor-pointer">Remember me on this device</label>
                </div>

                <!-- Submit -->
                <button type="submit" id="submit-btn"
                    class="w-full bg-blue-900 text-white font-semibold py-3.5 rounded-xl hover:bg-blue-800 transition-colors flex items-center justify-center gap-2">
                    <span id="btn-text">Sign In →</span>
                    <span id="btn-spinner" class="hidden animate-spin">⏳</span>
                </button>
            </form>

            <p class="text-center text-sm text-gray-500 mt-6">
                Don't have an account?
                <a href="register.html" class="text-blue-700 font-medium hover:underline">Register here</a>
            </p>

            <div class="border-t border-gray-100 mt-6 pt-5 text-center">
                <a href="admin-login.html" class="text-xs text-gray-400 hover:text-gray-600 transition-colors">
                    Admin? Sign in to the Admin Portal →
                </a>
            </div>
        </div>
    </div>
</div>

<!-- Toast -->
<div id="toast" class="toast fixed top-6 left-1/2 -translate-x-1/2 z-[9999] px-6 py-3 rounded-xl font-medium text-sm text-white shadow-xl opacity-0 pointer-events-none -translate-y-4">
    <span id="toast-msg"></span>
</div>

<script>
// Demo credentials
const DEMO_EMAIL    = 'student@campus.edu';
const DEMO_PASSWORD = 'password123';

/* ── Show / Hide Password ─────────────────────────────────── */
function togglePassword() {
    const input = document.getElementById('password');
    const btn   = document.getElementById('toggle-pw');
    if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = '🙈';
    } else {
        input.type = 'password';
        btn.textContent = '👁';
    }
}

/* ── Forgot Password ──────────────────────────────────────── */
function forgotPassword() {
    showToast('Password reset feature coming soon. Contact the estate office.', 'info');
}

/* ── Clear errors on input ────────────────────────────────── */
['email','password'].forEach(id => {
    document.getElementById(id).addEventListener('input', () => {
        const input = document.getElementById(id);
        const err   = document.getElementById('err-' + id);
        input.classList.remove('input-error','border-red-500');
        err.classList.add('hidden');
        document.getElementById('error-box').classList.add('hidden');
    });
});

/* ── Login Form Submit ────────────────────────────────────── */
document.getElementById('login-form').addEventListener('submit', function(e) {
    e.preventDefault();

    const email    = document.getElementById('email').value.trim().toLowerCase();
    const password = document.getElementById('password').value;
    let valid = true;

    // Clear previous errors
    ['email','password'].forEach(id => {
        document.getElementById(id).classList.remove('input-error','border-red-500');
        document.getElementById('err-' + id).classList.add('hidden');
    });
    document.getElementById('error-box').classList.add('hidden');

    // Validate email format
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!email) {
        showFieldError('email', 'Email address is required.');
        valid = false;
    } else if (!emailRegex.test(email)) {
        showFieldError('email', 'Please enter a valid email address.');
        valid = false;
    }

    // Validate password not empty
    if (!password) {
        showFieldError('password', 'Password is required.');
        valid = false;
    }

    if (!valid) return;

    // Show loading spinner
    setLoading(true);

    // Simulate authentication (replace with PHP fetch in real version)
    setTimeout(() => {
        setLoading(false);

        if (email === DEMO_EMAIL && password === DEMO_PASSWORD) {
            // ✅ Correct credentials
            showToast('Login successful! Redirecting...', 'success');
            setTimeout(() => window.location.href = 'dashboard.html', 1500);
        } else {
            // ❌ Wrong credentials — show generic error
            const errBox = document.getElementById('error-box');
            errBox.textContent = '❌ Invalid email or password. Please try again.';
            errBox.classList.remove('hidden');
            // Shake the form card
            errBox.scrollIntoView({ behavior:'smooth', block:'center' });
        }
    }, 1200);
});

/* ── Helpers ──────────────────────────────────────────────── */
function showFieldError(fieldId, message) {
    const input = document.getElementById(fieldId);
    const errEl = document.getElementById('err-' + fieldId);
    input.classList.add('input-error','border-red-500');
    errEl.textContent = '⚠ ' + message;
    errEl.classList.remove('hidden');
}

function setLoading(isLoading) {
    const btn     = document.getElementById('submit-btn');
    const text    = document.getElementById('btn-text');
    const spinner = document.getElementById('btn-spinner');
    btn.disabled  = isLoading;
    text.textContent = isLoading ? 'Signing In...' : 'Sign In →';
    spinner.classList.toggle('hidden', !isLoading);
}

function showToast(message, type = 'info') {
    const toast = document.getElementById('toast');
    const colours = { info:'bg-blue-900', success:'bg-green-700', warning:'bg-amber-600', error:'bg-red-600' };
    toast.className = `toast fixed top-6 left-1/2 -translate-x-1/2 z-[9999] px-6 py-3 rounded-xl font-medium text-sm text-white shadow-xl ${colours[type]}`;
    document.getElementById('toast-msg').textContent = message;
    toast.classList.remove('opacity-0','-translate-y-4','pointer-events-none');
    toast.classList.add('opacity-100','translate-y-0');
    clearTimeout(toast._t);
    toast._t = setTimeout(() => {
        toast.classList.add('opacity-0','-translate-y-4','pointer-events-none');
        toast.classList.remove('opacity-100','translate-y-0');
    }, 4000);
}
</script>
</body>
</html>
