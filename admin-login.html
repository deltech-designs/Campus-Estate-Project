<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — Campus Estate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'DM Sans', sans-serif; }
        h1 { font-family: 'Playfair Display', serif; }
        .toast { transition: all 0.35s ease; }
        .input-error { border-color: #dc2626 !important; }
    </style>
</head>
<body class="bg-gray-900 min-h-screen flex items-center justify-center px-4 py-12">

<div class="w-full max-w-md">
    <div class="bg-white rounded-2xl shadow-2xl p-8">

        <!-- Logo -->
        <div class="flex items-center gap-3 mb-8">
            <div class="w-12 h-12 rounded-xl bg-gray-900 flex items-center justify-center text-xl">⚙️</div>
            <div>
                <div class="font-bold text-gray-900 text-lg">Admin Portal</div>
                <div class="text-xs text-gray-400">CampusEstate Management</div>
            </div>
        </div>

        <h1 class="text-2xl font-bold text-gray-900 mb-1">Administrator Login</h1>
        <p class="text-gray-500 text-sm mb-8">Restricted access — authorised personnel only.</p>

        <!-- Demo hint -->
        <div class="bg-amber-50 border border-amber-200 rounded-xl p-3 mb-6 text-xs text-amber-700">
            <strong>Demo:</strong> admin@campus.edu &nbsp;/&nbsp; Admin@1234
        </div>

        <!-- Error box -->
        <div id="error-box" class="hidden bg-red-50 border border-red-200 text-red-700 text-sm px-4 py-3 rounded-xl mb-5"></div>

        <!-- Form -->
        <form id="admin-form" novalidate class="space-y-5">

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Admin Email</label>
                <input id="email" type="email" placeholder="admin@campus.edu"
                    class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-gray-800 transition-all">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Password</label>
                <div class="relative">
                    <input id="password" type="password" placeholder="Enter admin password"
                        class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-gray-800 transition-all pr-12">
                    <button type="button" onclick="togglePw()" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 text-lg">👁</button>
                </div>
            </div>

            <button type="submit" id="submit-btn"
                class="w-full bg-gray-900 text-white font-semibold py-3.5 rounded-xl hover:bg-gray-800 transition-colors flex items-center justify-center gap-2">
                <span id="btn-text">Sign In to Admin Panel →</span>
                <span id="btn-spinner" class="hidden animate-spin">⏳</span>
            </button>
        </form>

        <div class="border-t border-gray-100 mt-6 pt-5 text-center">
            <a href="login.html" class="text-xs text-gray-400 hover:text-gray-600 transition-colors">← Student Login</a>
            &nbsp;·&nbsp;
            <a href="index.html" class="text-xs text-gray-400 hover:text-gray-600 transition-colors">← Home</a>
        </div>
    </div>
</div>

<!-- Toast -->
<div id="toast" class="toast fixed top-6 left-1/2 -translate-x-1/2 z-[9999] px-6 py-3 rounded-xl font-medium text-sm text-white shadow-xl opacity-0 pointer-events-none -translate-y-4">
    <span id="toast-msg"></span>
</div>

<script>
const ADMIN_EMAIL    = 'admin@campus.edu';
const ADMIN_PASSWORD = 'Admin@1234';

function togglePw() {
    const input = document.getElementById('password');
    input.type  = input.type === 'password' ? 'text' : 'password';
}

document.getElementById('admin-form').addEventListener('submit', function(e) {
    e.preventDefault();
    const email    = document.getElementById('email').value.trim().toLowerCase();
    const password = document.getElementById('password').value;

    document.getElementById('error-box').classList.add('hidden');

    if (!email || !password) {
        showError('Please fill in all fields.');
        return;
    }

    setLoading(true);

    setTimeout(() => {
        setLoading(false);
        if (email === ADMIN_EMAIL && password === ADMIN_PASSWORD) {
            showToast('Admin login successful! Redirecting...', 'success');
            setTimeout(() => window.location.href = 'admin-dashboard.html', 1500);
        } else {
            showError('🔒 Invalid admin credentials. Please try again.');
        }
    }, 1200);
});

function showError(msg) {
    const box = document.getElementById('error-box');
    box.textContent = msg;
    box.classList.remove('hidden');
}

function setLoading(isLoading) {
    document.getElementById('submit-btn').disabled = isLoading;
    document.getElementById('btn-text').textContent = isLoading ? 'Signing In...' : 'Sign In to Admin Panel →';
    document.getElementById('btn-spinner').classList.toggle('hidden', !isLoading);
}

function showToast(message, type = 'info') {
    const toast = document.getElementById('toast');
    const colours = { info:'bg-blue-900', success:'bg-green-700', warning:'bg-amber-600', error:'bg-red-600' };
    toast.className = `toast fixed top-6 left-1/2 -translate-x-1/2 z-[9999] px-6 py-3 rounded-xl font-medium text-sm text-white shadow-xl ${colours[type]}`;
    document.getElementById('toast-msg').textContent = message;
    toast.classList.remove('opacity-0','-translate-y-4','pointer-events-none');
    toast.classList.add('opacity-100','translate-y-0');
    clearTimeout(toast._t);
    toast._t = setTimeout(() => {
        toast.classList.add('opacity-0','-translate-y-4','pointer-events-none');
        toast.classList.remove('opacity-100','translate-y-0');
    }, 4000);
}
</script>
</body>
</html>
